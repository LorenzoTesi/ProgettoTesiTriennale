
services:
  # 1. DATABASE MongoDB
  mongodb:
    image: mongo:latest
    container_name: sorveglianza_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rete_sorveglianza
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. BACKEND (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sorveglianza_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - rete_sorveglianza

  # 3. DASHBOARD FRONTEND (Streamlit)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sorveglianza_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - rete_sorveglianza

  # 4. LLM LOCALE (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: sorveglianza_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - rete_sorveglianza

  # 5. Pull automatico del modello Ollama al primo avvio (punto 2).
  ollama-init:
    image: ollama/ollama:latest
    container_name: sorveglianza_ollama_init
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'In attesa che Ollama sia pronto...';
        until ollama list > /dev/null 2>&1; do sleep 2; done;
        echo 'Ollama pronto. Scarico il modello: ' $${OLLAMA_MODEL:-llama3.2};
        ollama pull $${OLLAMA_MODEL:-llama3.2};
        echo 'Modello disponibile.';
      "
    networks:
      - rete_sorveglianza

networks:
  rete_sorveglianza:
    driver: bridge

volumes:
  mongo_data:
  ollama_storage: